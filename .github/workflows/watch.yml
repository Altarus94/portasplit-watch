name: PortaSplit watch

on:
  # Le robot tourne desormais sur le NAS Synology (IP residentielle -> couvre
  # Castorama + Boulanger + Amazon). Le cron GitHub est DESACTIVE pour eviter
  # les doubles alertes. workflow_dispatch reste pour un test manuel (Castorama).
  workflow_dispatch:            # + bouton "Run workflow" pour tester a la main

permissions:
  contents: write             # autorise le script a enregistrer son etat

concurrency:
  group: portasplit-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Verifier le stock
        env:
          # Topic ntfy : stocke dans un SECRET du depot (Settings > Secrets and
          # variables > Actions). N'apparait donc jamais dans le code public.
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          WATCH_POSTAL: "94100"        # ta zone (livraison + lien de la notif)
          CASTO_EAN: "8431312260509"   # EAN du Midea PortaSplit chez Castorama
          CASTO_STORE_IDS: ""          # storeId magasins a surveiller (vide = livraison a domicile seule)
          AMAZON_ASIN: ""              # Amazon: desactive sur GitHub (captcha datacenter) ; actif sur le NAS
          BOULANGER_REF: ""            # Boulanger: desactive sur GitHub (Akamai bloque les datacenters) ; actif sur le NAS
          DAILY_OK_HOUR: "18"          # heure FR du ping quotidien "tout va bien" (-1 pour le desactiver)
        run: python watch.py

      - name: Sauvegarder l'etat (anti-spam)
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "portasplit-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: maj etat stock [skip ci]"
            git push
          fi
